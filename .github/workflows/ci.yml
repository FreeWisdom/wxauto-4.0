name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    name: Import & collect (py${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Import smoke
        run: |
          python -c "import wxauto4; print('exports:', wxauto4.__all__)"

      - name: Verify test file imports
        run: |
          python -c "import test_module1_basic; print('test_module1_basic OK')"
          python -c "import test_module2_messages; print('test_module2_messages OK')"
          python -c "import test_module3_listener; print('test_module3_listener OK')"
          python -c "import test_module4_windows_moments; print('test_module4_windows_moments OK')"
          python -c "import test_at; print('test_at OK')"

  test:
    name: Unit tests (py${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev deps
        run: |
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v
